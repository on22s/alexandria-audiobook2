services:
  alexandria:
    build: .
    ports:
      - "4200:4200"
    volumes:
      # Persist HuggingFace model cache (~3.5 GB per model, downloaded on first use)
      - hf_cache:/root/.cache/huggingface
      # Persist user data
      - ./data/uploads:/alexandria/app/uploads
      - ./data/designed_voices:/alexandria/designed_voices
      - ./data/clone_voices:/alexandria/clone_voices
      - ./data/lora_models:/alexandria/lora_models
      - ./data/lora_datasets:/alexandria/lora_datasets
      - ./data/dataset_builder:/alexandria/dataset_builder
      - ./data/scripts:/alexandria/scripts
      # Persist audiobook output
      - ./data/output:/alexandria/voicelines
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  hf_cache:
