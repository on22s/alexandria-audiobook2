name: tests

# Fast pre-merge gate: unit tests (mocked LLM/TTS) + the live API suite run
# against a disposable ALEXANDRIA_DATA_DIR. GPU/LLM-dependent `--full` tests are
# intentionally NOT run here — they need a real GPU + LM Studio and belong in a
# separate manual/self-hosted job.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: app/requirements.txt

      - name: Install system libraries (soundfile / pydub)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libsndfile1 ffmpeg

      - name: Install Python dependencies
        # The web app and both test entrypoints import nothing from
        # torch/transformers/peft — those are lazy-loaded only for real TTS/LoRA
        # work, which the tests mock. Skipping those two lines avoids pulling a
        # multi-GB CUDA torch wheel (minutes of install) for zero test coverage.
        # Everything else is taken straight from requirements.txt, so this can't
        # drift from what the app actually declares.
        run: |
          python -m pip install --upgrade pip
          grep -vE '^(transformers|peft)==' requirements.txt | pip install -r /dev/stdin

      - name: Snapshot maintenance hints
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: python diagnose_pr_changes.py --base "$BASE_SHA"

      - name: Shared release verifier
        id: verify
        run: python verify_release.py --json-report release-report.json

      - name: Diagnose whether failure exists on the base commit
        if: always() && github.event_name == 'pull_request' && steps.verify.outcome == 'failure'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          BASE_WORKTREE="${RUNNER_TEMP}/alexandria-base"
          git worktree add --detach "$BASE_WORKTREE" "$BASE_SHA"
          set +e
          (cd "$BASE_WORKTREE/app" && python verify_release.py --json-report "${RUNNER_TEMP}/base-release-report.json")
          BASE_STATUS=$?
          set -e
          git worktree remove --force "$BASE_WORKTREE"
          if [ ! -f "${RUNNER_TEMP}/base-release-report.json" ]; then
            echo "::warning::Base verification was indeterminate because it produced no JSON report."
          elif [ "$BASE_STATUS" -eq 0 ]; then
            cp "${RUNNER_TEMP}/base-release-report.json" base-release-report.json
            echo "::error::The base commit passes; this pull request introduced the verifier failure."
          else
            cp "${RUNNER_TEMP}/base-release-report.json" base-release-report.json
            echo "::warning::The verifier also fails on the base commit; inspect both JSON reports."
          fi

      - name: Upload verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-verification-report
          path: |
            app/release-report.json
            app/base-release-report.json
          if-no-files-found: warn
